<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | OmniModal AI Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="/static/auth.css" />
</head>
<body data-mode="register">
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="auth-wrap">
        <div class="card auth-card border-0 shadow-lg">
            <div class="card-body p-4 p-lg-5">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <div>
                        <h1 class="auth-title mb-1">Create Account</h1>
                        <p class="auth-subtitle mb-0">Register securely to use your OmniModal assistant.</p>
                    </div>
                    <button id="themeToggleBtn" class="btn btn-outline-secondary btn-sm" type="button">
                        <i class="bi bi-moon-stars me-1"></i>
                        <span id="themeLabel">Dark</span>
                    </button>
                </div>

                <form id="authForm" novalidate>
                    <div class="mb-3">
                        <label for="usernameInput" class="form-label">Username</label>
                        <input id="usernameInput" class="form-control" type="text" autocomplete="username" required />
                    </div>

                    <div class="mb-3">
                        <label for="emailInput" class="form-label">Email</label>
                        <input id="emailInput" class="form-control" type="email" autocomplete="email" required />
                    </div>

                    <div class="mb-3">
                        <label for="passwordInput" class="form-label">Password</label>
                        <input id="passwordInput" class="form-control" type="password" autocomplete="new-password" required />
                        <div class="form-text">8+ chars, uppercase, lowercase, number, special character.</div>
                    </div>

                    <div class="mb-3">
                        <label for="confirmPasswordInput" class="form-label">Confirm Password</label>
                        <input id="confirmPasswordInput" class="form-control" type="password" autocomplete="new-password" required />
                    </div>

                    <div id="errorBox" class="alert alert-danger d-none py-2" role="alert"></div>

                    <button id="submitBtn" class="btn btn-primary w-100" type="submit">
                        <span id="submitText">Register</span>
                        <span id="submitSpinner" class="spinner-border spinner-border-sm d-none"></span>
                    </button>
                </form>

                <p class="auth-foot mt-3 mb-0">
                    Already have an account? <a href="/login">Sign in</a>
                </p>
            </div>
        </div>
    </main>

    <script src="/static/auth.js"></script>
</body>
</html>
